name: Build site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      # Downloadable zip of the finished static site.
      # Download from the run's "Artifacts" section, unzip, and upload
      # the contents into Hostinger public_html via File Manager.
      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
